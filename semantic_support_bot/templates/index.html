<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYJC Multilingual Support Chatbot</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #334e68;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 {
            color: #102a43;
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
        }
        p {
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .lang-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 1rem;
            color: #486581;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FYJC Assistant</h1>
        <p>
            Welcome! I can assist you with your FYJC admission questions in the language you prefer.
        </p>
        <div class="lang-list">
            <span>English</span>
            <span>|</span>
            <span>मराठी</span>
            <span>|</span>
            <span>हिंदी</span>
        </div>
        <p style="margin-top: 2rem; font-size: 0.9rem; color: #627d98;">
            Click the chat icon below to start a conversation.
        </p>
    </div>

    <!-- The widget.js will be served from our static directory -->
    <script src="/static/widget.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.initFYJCBot({
                apiHost: window.location.origin,
                welcomeMsg: 'Hello! I can help you with FYJC admissions in English, Marathi, or Hindi. / नमस्कार! मी आपल्याला अकरावी प्रवेशासाठी इंग्रजी, मराठी किंवा हिंदीमध्ये मदत करू शकतो. / नमस्ते! मैं आपको ग्यारहवीं कक्षा के प्रवेश के लिए अंग्रेजी, मराठी या हिंदी में मदद कर सकता हूँ।'
            });
        });
    </script>
</body>
</html>
